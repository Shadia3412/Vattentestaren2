<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VattenTestaren Karta</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #ADD8E6;
    margin: 0;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 20px;
}

.logo {
    width: 150px;
}

.menu-links a {
    margin-left: 10px;
}

.search-wrapper {
    position: relative;
    max-width: 700px;
    margin: 0 auto 20px auto;
}

.search-container {
    display: flex;
}

.search-container button {
    margin-left: 10px;
}

#placesList {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    width: calc(100% - 90px);
    background: white;
    border: 1px solid #ccc;
    border-radius: 5px;
    z-index: 9999;
    list-style: none;
    padding: 0;
    margin: 0;
    text-align: left;
}

#placesList li {
    padding: 10px;
    cursor: pointer;
}

#placesList li:hover {
    background-color: #f0f0f0;
}

.map-image {
    width: 40%;
    display: block;
    margin: 20px auto;
}

.main-content {
    text-align: center;
    padding-top: 40px;
}
</style>
</head>

<body>

<div class="top-bar">
    <img src="naturvardsverket-logo.png" class="logo" alt="Logo">

    <div class="menu-links">
        <a href="index.html" class="btn btn-primary">Home</a>
        <a href="karta.html" class="btn btn-primary">Karta</a>
        <a href="manual.html" class="btn btn-primary">Manual</a>
    </div>
</div>

<div class="main-content">
    <h1>VattenTestaren</h1>
    <h3>Karta</h3>

    <div class="search-wrapper">
        <div class="search-container">
            <input type="text" id="searchInput" class="form-control" placeholder="Sök naturreservat...">
            <button class="btn btn-primary" type="button">Sök</button>
        </div>
        <ul id="placesList"></ul>
    </div>

    <div class="map-image-container">
        <img src="naturreservatoversikt.png" class="map-image" alt="Karta">
    </div>
</div>

<script>
const places = [
    "Sätraskogen", "Nacka", "Hagsätraskogen", "Hansta", "Judarskogen",
    "Kungliga nationalstadsparken", "Grimsta", "Älvsjöskogen",
    "Rågsved", "Flaten", "Igelbäcken", "Årstaskogen"
];

document.getElementById("searchInput").addEventListener("input", function() {
    let input = this.value.toLowerCase().trim();
    let ul = document.getElementById("placesList");

    ul.innerHTML = "";
    let found = false;

    if (input === "") {
        ul.style.display = "none";
        return;
    }

    places.forEach(place => {
        if (place.toLowerCase().includes(input)) {
            let li = document.createElement("li");
            li.textContent = place;

            li.onclick = function() {
                document.getElementById("searchInput").value = place;
                ul.style.display = "none";
            };

            ul.appendChild(li);
            found = true;
        }
    });

    if (!found) {
        let li = document.createElement("li");
        li.textContent = "Ingen matchning";
        li.style.color = "gray";
        li.style.fontStyle = "italic";
        li.style.cursor = "default";
        ul.appendChild(li);
    }

    ul.style.display = "block";
});
</script>

</body>
</html>
