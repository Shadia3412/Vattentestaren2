<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VattenTestaren Karta</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #ADD8E6;
    margin: 0;
}

.logo {
    width: 120px;
}

.search-wrapper {
    position: relative;
    max-width: 600px;
    margin: 0 auto 20px auto;
}

.search-container {
    display: flex;
}

.search-container button {
    margin-left: 10px;
}

#placesList {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    width: calc(100% - 90px);
    background: white;
    border: 1px solid #ccc;
    border-radius: 5px;
    z-index: 9999;
    list-style: none;
    padding: 0;
    margin: 0;
    text-align: left;
}

#placesList li {
    padding: 10px;
    cursor: pointer;
}

#placesList li:hover {
    background-color: #f0f0f0;
}

.map-image {
    width: 40%;
    display: block;
    margin: 20px auto;
}

.main-content {
    text-align: center;
    padding-top: 60px;
}

.menu-box {
    background: white;
    padding: 10px;
    border-radius: 5px;
    min-width: 120px;
}

.menu-box a {
    display: block;
    margin-bottom: 8px;
    text-decoration: none;
}

.menu-box a:last-child {
    margin-bottom: 0;
}
</style>
</head>

<body>

 <img src="naturvardsverket-logo.png" class="logo" alt="Naturvårdsverket logo">

    <button class="btn btn-primary meny-btn" onclick="toggleMenu()">
        Meny
    </button>

    <div class="meny-collapse" id="menyCollapse">
        <a href="VattenTestaren.html" class="meny-item">Home</a>
        <a href="Vattentestaren2.html" class="meny-item">Karta</a>
        <a href="Vattentestaren4.html" class="meny-item">Manual</a>
    </div>

    <div class="main-content">
        <h1>VattenTestaren</h1>
        <h3>Karta</h3>

        <div class="search-wrapper">
            <div class="search-container">
                <input type="text" id="searchInput" class="form-control" placeholder="Sök naturreservat...">
                <button class="btn btn-primary" type="button">Sök</button>
            </div>
            <ul id="placesList"></ul>
        </div>

        <div class="map-image-container">
            <img src="naturreservatoversikt.png" class="map-image" alt="Karta">
        </div>
    </div>

<script>
const places = [
    "Sätraskogen","Nacka","Hagsätraskogen","Hansta","Judarskogen",
    "Kungliga nationalstadsparken","Grimsta","Älvsjöskogen",
    "Rågsved","Flaten","Igelbäcken","Årstaskogen"
];

document.getElementById("searchInput").addEventListener("input", function() {
    let input = this.value.toLowerCase().trim();
    let ul = document.getElementById("placesList");

    ul.innerHTML = "";
    let found = false;

    if (input === "") {
        ul.style.display = "none";
        return;
    }

    places.forEach(place => {
        if (place.toLowerCase().includes(input)) {
            let li = document.createElement("li");
            li.textContent = place;

            li.onclick = function() {
                document.getElementById("searchInput").value = place;
                ul.style.display = "none";
            };

            ul.appendChild(li);
            found = true;
        }
    });

    if (!found) {
        let li = document.createElement("li");
        li.textContent = "Ingen matchning";
        li.style.color = "gray";
        li.style.fontStyle = "italic";
        li.style.cursor = "default";
        ul.appendChild(li);
    }

    ul.style.display = "block";
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
