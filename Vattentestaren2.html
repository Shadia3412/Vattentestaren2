<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VattenTestaren Karta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #ADD8E6;
        }

        .logo {
            width: 200px;
        }

        .map-image {
            width: 100%;
            height: auto;
        }

        .meny-btn {
            position: fixed;
            top: 10px;
            right: 10px;
        }

        .meny-collapse {
            position: fixed;
            top: 50px;
            right: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        .meny-item {
            display: block;
            margin-bottom: 5px;
        }

        h1 {
            color: #040474;
        }

        /* 🔥 SEARCH DROPDOWN FIX */
        .search-wrapper {
            position: relative;
            max-width: 800px;
            margin: 0 auto 20px auto;
        }

        .search-container {
            display: flex;
        }

        .search-container button {
            margin-left: 10px;
        }

        #placesList {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: calc(100% - 90px);
            background: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            z-index: 9999;
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
        }

        #placesList li {
            padding: 10px;
            cursor: pointer;
        }

        #placesList li:hover {
            background-color: #f0f0f0;
        }

        .highlight {
            position: absolute;
            top: 60%;
            left: 32%;
            width: 6%;
            height: 6%;
            background-color: rgba(255,0,0,0.5);
            display: none;
        }
    </style>
</head>

<body>

<header>
    <div class="navbar navbar-dark bg-grayish">
        <div class="container d-flex justify-content-between">
            <img src="naturvardsverket-logo.png" class="logo">
            <button class="btn btn-primary meny-btn" onclick="toggleMenu()">Meny</button>
        </div>
    </div>
</header>

<main class="container text-center">

    <h1>VattenTestaren</h1>
    <h3>Karta</h3>

    <!-- 🔥 FIXED SEARCH -->
    <div class="search-wrapper">

        <div class="search-container">
            <input type="text" id="searchInput" class="form-control" placeholder="Sök naturreservat...">
            <button class="btn btn-primary" onclick="search()">Sök</button>
        </div>

        <ul id="placesList">
            <li>Sätraskogen</li>
            <li>Nacka</li>
            <li>Hagsätraskogen</li>
            <li>Hansta</li>
            <li>Judarskogen</li>
            <li>Kungliga nationalstadsparken</li>
            <li>Grimsta</li>
            <li>Älvsjöskogen</li>
            <li>Rågsved</li>
            <li>Flaten</li>
            <li>Igelbäcken</li>
            <li>Årstaskogen</li>
        </ul>

    </div>

    <!-- MAP -->
    <div class="map-image-container" style="position:relative;">
        <img src="naturreservatoversikt.png" class="map-image">
        <div id="satraskogen-highlight" class="highlight"></div>
    </div>

</main>

<script src="script.js"></script>

</body>
</html>
