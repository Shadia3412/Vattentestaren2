<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VattenTestaren Karta</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #ADD8E6;
    margin: 0;
}

.logo {
    width: 120px;
}

.meny-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 10001;
}

.meny-collapse {
    position: fixed;
    top: 60px;
    right: 10px;
    background-color: #fff;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    z-index: 10000;
    min-width: 140px;
}

.meny-collapse:not(.show) {
    display: none;
}

.meny-item {
    display: block;
    margin-bottom: 8px;
    text-decoration: none;
    color: black;
}

.meny-item:last-child {
    margin-bottom: 0;
}

.search-wrapper {
    position: relative;
    max-width: 600px;
    margin: 0 auto 20px auto;
}

.search-container {
    display: flex;
}

.search-container button {
    margin-left: 10px;
}

#placesList {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    width: calc(100% - 90px);
    background: white;
    border: 1px solid #ccc;
    border-radius: 5px;
    z-index: 9999;
    list-style: none;
    padding: 0;
    margin: 0;
    text-align: left;
}

#placesList li {
    padding: 10px;
    cursor: pointer;
}

#placesList li:hover {
    background-color: #f0f0f0;
}

.main-content {
    text-align: center;
    padding-top: 60px;
}

.map-image-container {
    position: relative;
    width: 40%;
    margin: 20px auto;
}

.map-image {
    width: 100%;
    display: block;
}

.marker {
    position: absolute;
    border: 3px solid red;
    border-radius: 5px;
    pointer-events: none;
}
</style>
</head>

<body>

<img src="naturvardsverket-logo.png" class="logo" alt="Naturvårdsverket logo">

<button class="btn btn-primary meny-btn"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#menyCollapse">
    Meny
</button>

<div class="collapse meny-collapse" id="menyCollapse">
    <a href="VattenTestaren.html" class="meny-item">Home</a>
    <a href="Vattentestaren2.html" class="meny-item">Karta</a>
    <a href="Vattentestaren4.html" class="meny-item">Manual</a>
</div>

<div class="main-content">
    <h1>VattenTestaren</h1>
    <h3>Karta</h3>

    <div class="search-wrapper">
        <div class="search-container">
            <input type="text" id="searchInput" class="form-control" placeholder="Sök naturreservat...">
            <button class="btn btn-primary" type="button" onclick="searchPlace()">Sök</button>
        </div>
        <ul id="placesList"></ul>
    </div>

    <div class="map-image-container">
        <img src="naturreservatoversikt.png" class="map-image" alt="Karta">

        <!-- MARKERINGAR -->
        <div class="marker" id="grimsta" style="top:30%; left:18%; width:90px; height:70px; display:none;"></div>
        <div class="marker" id="satra" style="top:30%; left:25%; width:85px; height:60px; display:none;"></div>
    </div>
</div>

<script>
const places = [
    "Sätraskogen","Nacka","Hagsätraskogen","Hansta","Judarskogen",
    "Kungliga nationalstadsparken","Grimsta","Älvsjöskogen",
    "Rågsved","Flaten","Igelbäcken","Årstaskogen"
];

document.getElementById("searchInput").addEventListener("input", function() {
    let input = this.value.toLowerCase().trim();
    let ul = document.getElementById("placesList");

    ul.innerHTML = "";
    let found = false;

    if (input === "") {
        ul.style.display = "none";
        return;
    }

    places.forEach(place => {
        if (place.toLowerCase().includes(input)) {
            let li = document.createElement("li");
            li.textContent = place;

            li.onclick = function() {
                document.getElementById("searchInput").value = place;
                ul.style.display = "none";
            };

            ul.appendChild(li);
            found = true;
        }
    });

    if (!found) {
        let li = document.createElement("li");
        li.textContent = "Ingen matchning";
        li.style.color = "gray";
        li.style.fontStyle = "italic";
        li.style.cursor = "default";
        ul.appendChild(li);
    }

    ul.style.display = "block";
});

function searchPlace() {
    let input = document.getElementById("searchInput").value.toLowerCase().trim();

    // göm alla
    document.getElementById("grimsta").style.display = "none";
    document.getElementById("satra").style.display = "none";

    // visa rätt
    if (input.includes("sätra")) {
        document.getElementById("satra").style.display = "block";
    }

    if (input.includes("grimsta")) {
        document.getElementById("grimsta").style.display = "block";
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
